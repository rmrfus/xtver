name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: xtver-x86_64-linux
          - target: aarch64-unknown-linux-musl
            artifact: xtver-aarch64-linux
          - target: armv7-unknown-linux-musleabihf
            artifact: xtver-armv7-linux

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: pip install ziglang && cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --target ${{ matrix.target }} --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/xtver

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Publish release
        run: |
          gzip -9 -c xtver-x86_64-linux/xtver > xtver-x86_64-linux.gz
          gzip -9 -c xtver-aarch64-linux/xtver > xtver-aarch64-linux.gz
          gzip -9 -c xtver-armv7-linux/xtver > xtver-armv7-linux.gz
          gh release delete "${GITHUB_REF_NAME}" --yes --repo "${GITHUB_REPOSITORY}" 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            xtver-x86_64-linux.gz \
            xtver-aarch64-linux.gz \
            xtver-armv7-linux.gz
        env:
          GH_TOKEN: ${{ github.token }}
