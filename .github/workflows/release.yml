name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: xtver-x86_64-linux
          - target: aarch64-unknown-linux-musl
            artifact: xtver-aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: pip install ziglang && cargo install cargo-zigbuild

      - name: Build
        run: cargo zigbuild --target ${{ matrix.target }} --release --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/xtver

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Stage binaries
        run: |
          cp xtver-x86_64-linux/xtver /tmp/xtver-x86_64-linux
          cp xtver-aarch64-linux/xtver /tmp/xtver-aarch64-linux
          mv /tmp/xtver-x86_64-linux .
          mv /tmp/xtver-aarch64-linux .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            xtver-x86_64-linux
            xtver-aarch64-linux
